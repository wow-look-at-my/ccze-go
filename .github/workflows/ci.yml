name: CI

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and test
        uses: wow-look-at-my/go-toolchain@v1

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install C ccze build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libncurses-dev libpcre3-dev hyperfine
          sudo apt-get install -y "linux-tools-$(uname -r)" || sudo apt-get install -y linux-tools-azure || true

      - name: Build C ccze from source
        run: |
          git clone https://github.com/cornet/ccze.git /tmp/ccze
          cd /tmp/ccze && ./configure CFLAGS="-O3 -g" && make
          sudo cp src/ccze /usr/local/bin/ccze
          sudo mkdir -p /usr/local/lib/ccze
          sudo cp src/*.so /usr/local/lib/ccze/

      - name: Run benchmarks
        run: testdata/bench-summary.sh

      - name: CPU profile — Go (pprof)
        run: |
          go test -bench='BenchmarkFullPipeline' -benchtime=5s -cpuprofile=cpu.prof -count=1 .
          echo "### CPU Profile — Go (pprof top 20)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          go tool pprof -top -nodecount=20 cpu.prof 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### CPU Profile — Go (pprof top 10 cumulative)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          go tool pprof -top -cum -nodecount=10 cpu.prof 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: CPU profile — C ccze (perf)
        run: |
          # Find the real perf binary (the wrapper script fails on kernel mismatch)
          PERF=$(find /usr/lib/linux-tools -name perf -type f 2>/dev/null | head -1)
          if [ -z "$PERF" ]; then
            echo "### CPU Profile — C ccze (perf)" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "_perf not available for this kernel — skipped_" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          sudo sysctl -w kernel.perf_event_paranoid=-1
          INPUT=testdata/mixed.log
          for i in $(seq 50); do cat "$INPUT"; done > /tmp/perf-input.log
          "$PERF" record -g -o perf.data -- ccze -A < /tmp/perf-input.log > /dev/null
          echo "### CPU Profile — C ccze (perf top 20)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          "$PERF" report -n --stdio --no-children -i perf.data 2>&1 | head -40 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload profiles
        uses: actions/upload-artifact@v4
        with:
          name: cpu-profiles
          path: |
            cpu.prof
            perf.data
