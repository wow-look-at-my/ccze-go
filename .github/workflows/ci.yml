name: CI

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and test
        uses: wow-look-at-my/go-toolchain@v1

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install C ccze build dependencies
        run: sudo apt-get update && sudo apt-get install -y libncurses-dev libpcre3-dev

      - name: Build C ccze from source
        run: testdata/build-c-ccze.sh

      - name: Run benchmarks
        run: testdata/bench-summary.sh
